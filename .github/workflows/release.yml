name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: timecard-cli/go.mod

      - name: Build timecard-cli
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          MODULE="$(grep '^module' timecard-cli/go.mod | awk '{print $2}')"
          LDFLAGS="-s -w -X ${MODULE}/cmd.Version=${VERSION} -X ${MODULE}/cmd.Commit=${COMMIT} -X ${MODULE}/cmd.BuildDate=${BUILD_DATE}"

          mkdir -p dist
          if [ "${GOOS}" = "windows" ]; then
            cd timecard-cli && go build -ldflags="${LDFLAGS}" -o "../dist/timecard-cli_windows_${GOARCH}.exe" .
          else
            cd timecard-cli && go build -ldflags="${LDFLAGS}" -o "../dist/timecard-cli_${GOOS}_${GOARCH}" .
          fi

      - name: Build wedaka-cli
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          MODULE="$(grep '^module' wedaka-cli/go.mod | awk '{print $2}')"
          LDFLAGS="-s -w -X ${MODULE}/cmd.Version=${VERSION} -X ${MODULE}/cmd.Commit=${COMMIT} -X ${MODULE}/cmd.BuildDate=${BUILD_DATE}"

          mkdir -p dist
          if [ "${GOOS}" = "windows" ]; then
            cd wedaka-cli && go build -ldflags="${LDFLAGS}" -o "../dist/wedaka-cli_windows_${GOARCH}.exe" .
          else
            cd wedaka-cli && go build -ldflags="${LDFLAGS}" -o "../dist/wedaka-cli_${GOOS}_${GOARCH}" .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
