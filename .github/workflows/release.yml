name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify release consistency
        # Checks version consistency, CHANGELOG entry, tag/file match, and CLI
        # build coverage. Fails the release early if the tag was cut inconsistently.
        run: bash scripts/verify-release.sh

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: nouveau-timecard-cli/go.mod

      - name: Build CLIs
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          # Keep this list in sync with scripts/build.sh — verify-release.sh enforces it.
          CLIS="nouveau-timecard-cli wedaka-cli azuredevops-cli chpw-cli"
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          mkdir -p dist
          for cli in $CLIS; do
            MODULE="$(grep '^module' "$cli/go.mod" | awk '{print $2}')"
            LDFLAGS="-s -w -X ${MODULE}/cmd.Version=${VERSION} -X ${MODULE}/cmd.Commit=${COMMIT} -X ${MODULE}/cmd.BuildDate=${BUILD_DATE}"
            if [ "${GOOS}" = "windows" ]; then
              (cd "$cli" && go build -ldflags="${LDFLAGS}" -o "../dist/${cli}_windows_${GOARCH}.exe" .)
            else
              (cd "$cli" && go build -ldflags="${LDFLAGS}" -o "../dist/${cli}_${GOOS}_${GOARCH}" .)
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
